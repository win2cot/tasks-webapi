openapi: 3.1.0
info:
  title: タスク管理システム API
  description: |
    マルチテナントSaaS型タスク管理システムのREST API仕様(基本設計書 v1.4 / 要件定義書 v1.4 準拠)。

    認証はKeycloak経由のOIDC、本APIはJWTを Spring Security OAuth2 Resource Server で検証する。
    全リクエストには `Authorization: Bearer {access_token}` を付与し、
    業務 API ではアクティブテナントを `X-Tenant-Id` ヘッダで送出する。
    プラットフォーム運用 API(`/api/auth/*` の一部・`/api/tenants` 系 SaaS Admin 操作・セルフサインアップ・`/api/platform/*`)は `X-Tenant-Id` を要求しない。

    認可は**プラットフォーム軸**と**テナント軸**の 2 軸で直交する(参照のみの Viewer は設けない)。
    タスクごとの参照認可は visibility (TENANT/STAKEHOLDERS/PRIVATE) と所有者・関係者・担当者の関係で決定する。

    ## 認可モデル詳細(2 軸直交)

    - **プラットフォーム軸 / SaaS Admin**: Keycloak realm role `APP_ADMIN` で管理する(本システム DB には保持しない)。
      テナント運営 API(`/api/tenants/**` 状態管理・`/api/platform/**` 監視)のみ操作可能。**業務 API(`/api/tasks/**`、`/api/dashboard/**`、`/api/tenant/users/**`、`/api/audit-logs` 等)には触れない**(呼び出された場合は 403)。Spring Security 上は `hasRole('APP_ADMIN')`。
    - **テナント軸 / Tenant Admin**: 本システム DB の `user_tenants.role = TENANT_ADMIN` で管理。
      テナント内ユーザー管理、全タスク参照・編集・削除、監査ログ参照が可能。Spring Security 上は `hasRole('TENANT_ADMIN')`。
    - **テナント軸 / Member**: 本システム DB の `user_tenants.role = MEMBER` で管理。
      タスク CRUD(編集・削除は所有者のみ)、テナント内タスク参照が可能。Spring Security 上は `hasRole('MEMBER')`。

    両軸は包含関係ではなく直交する。SaaS Admin が業務 API を呼んでも自動的に Tenant Admin 権限を持つわけではない(同一の Keycloak ユーザーが両方の役割を兼ねている場合、それは別軸での個別の所属である)。

    ## セルフサインアップ(モデル B)

    テナント作成 `POST /api/tenants` は **認証済み(Keycloak ログイン済み)のユーザーが自分自身でテナントを作成**する。SaaS Admin 専用 API ではない。作成と同時に呼び出しユーザーが初代 Tenant Admin として `user_tenants` に登録される。レート制限・ドメイン制限・承認制等の濫用対策は Phase 2。

    ## 共通レスポンス

    認証必須エンドポイントは下記レスポンスを共通的に返す可能性があります(個別 `responses` 節では省略している場合あり):

    - `401 Unauthorized` — JWT欠落 / 署名不正 / 期限切れ
    - `403 Forbidden` — テナント越境、ロール権限不足、編集系で所有者でない 等
    - `404 Not Found` — リソース不在、または **参照系で参照権限不足**(リソース存在を漏らさない方針)
    - `500 Internal Server Error` — サーバー内部エラー
  version: "1.4.1"
  contact:
    name: 開発チーム
    email: dev@example.com
  license:
    name: Proprietary

tags:
  - name: Auth
    description: 認証・セッション管理(Keycloak OIDC)
  - name: Tenant
    description: テナント管理(セルフサインアップ、状態管理、SaaS Admin 向け運営)
  - name: Platform
    description: プラットフォーム監視 API(SaaS Admin 専用)
  - name: User
    description: テナント内ユーザー管理(プロフィール / 通知設定 / 招待 / ロール)
  - name: Task
    description: タスク管理(可視性・関係者・ステータス)
  - name: Dashboard
    description: テナント内ダッシュボード集計
  - name: Audit
    description: 監査ログ参照(Tenant Admin)

servers:
  - url: https://api.taskflow.example.com
    description: 本番環境
  - url: https://staging-api.taskflow.example.com
    description: ステージング環境
  - url: http://localhost:8080
    description: ローカル開発環境

# ======================================================================
# セキュリティ
# ======================================================================
security:
  - bearerAuth: []
    tenantHeader: []

# ======================================================================
# パス
# ======================================================================
paths:
  # --- 認証・テナント ---
  /api/auth/me:
    get:
      tags: [Auth]
      summary: ログイン中ユーザー情報・所属テナント一覧
      description: |
        ログインユーザーの基本情報と所属テナント一覧を返す。
        テナント未選択状態(初回ログイン直後・テナント切替前)でも呼び出されるため、
        グローバルセキュリティから `tenantHeader` をオーバーライドで除外する。
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/auth/tenants/{tenantId}/select:
    post:
      tags: [Auth]
      summary: アクティブテナント切替
      description: |
        アクティブテナントを設定する。テナント未選択状態でも呼び出されるため、
        グローバルセキュリティから `tenantHeader` をオーバーライドで除外する。
      operationId: selectTenant
      security:
        - bearerAuth: []
      parameters:
        - { name: tenantId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: No Content }
        "403": { $ref: "#/components/responses/Forbidden" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: ログアウト(Keycloakセッション終了)
      description: |
        Keycloakのセッションを終了する。テナント未選択状態でも呼び出し可能なため、
        グローバルセキュリティから `tenantHeader` をオーバーライドで除外する。
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- テナント ---
  /api/tenants:
    get:
      tags: [Tenant]
      summary: テナント一覧 (SaaS Admin)
      description: |
        全テナントの一覧を返す(SaaS Admin 監視ダッシュボード S-13 用)。
        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要(プラットフォーム運用 API)。

        **HTTP ステータス**: 本エンドポイントは SaaS Admin 専用のコレクションリソースであり、認可違反時は `403` を返す。
        個別リソース取得(`GET /api/tenants/{id}`)では「リソース存在を漏らさない」方針で `404` を返すが、
        コレクション全体への列挙拒否では存在秘匿の必要がないため慣習どおり `403` を採用する。

        **デフォルトソート順**: `createdAt DESC`(最近作成されたテナントを先頭)。

        **ページネーション**: Phase 1 ではページネーション未対応(全件返却)。テナント数が増加した時点で
        Phase 2 にて `page` / `size` パラメータの導入を検討する。
      operationId: listTenants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Tenant]
      summary: テナント作成(セルフサインアップ、認証済みユーザー)
      description: |
        認証済み(Keycloak ログイン済み)のユーザーが自分自身でテナントを新規作成する(モデル B)。
        作成と同時に呼び出しユーザーが初代 Tenant Admin として `user_tenants` に登録される(アトミック)。
        `X-Tenant-Id` ヘッダは要求しない(テナント未所属状態で呼ぶ API のため)。

        **JIT プロビジョニング前提**: 呼び出しユーザーの `users` 行は JWT 認証フィルタ層の JIT で
        自動作成されているため、本ハンドラ到達時には必ず確保されている。仮に JIT が失敗した場合は
        認証フィルタ層で `500` を返すため、本ハンドラは `users` 行不在を考慮しなくてよい。

        **複数テナント作成**: 1 ユーザーが複数テナントを作成することは Phase 1 では制限しない
        (コンサル等の兼務想定。`user_tenants` の複数テナント所属モデル §2.4 と整合)。
        レート制限・ドメイン制限・承認制等の濫用対策は Phase 2 で導入する。
      operationId: createTenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantCreateRequest" }
      responses:
        "201":
          description: Created。初代 Tenant Admin として登録された `user_tenants` 概要を含む。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantCreatedResponse" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/tenants/{id}:
    get:
      tags: [Tenant]
      summary: テナント単体取得
      description: |
        指定 ID のテナント情報を取得する。
        認可: SaaS Admin は任意のテナントを取得可能。一般ユーザーは自分が所属するテナントのみ取得可能。
        所属していないテナントを指定した場合・存在しない ID を指定した場合は、いずれも **404** を返す
        (HTTP Status Policy: 参照系で参照不可は 404、NIST AC-4 リソース存在秘匿)。
        `X-Tenant-Id` ヘッダ不要(クエリ対象テナントはパスパラメータで指定)。
      operationId: getTenant
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Tenant]
      summary: テナント名更新 (SaaS Admin)
      description: |
        テナント名(表示名)を更新する。
        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要。
        状態切替は `PATCH /api/tenants/{id}/status` を使用すること(本エンドポイントでは status を変更できない)。
        プラン変更は Phase 2(契約管理機能)で実装する。
      operationId: updateTenant
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/tenants/{id}/status:
    patch:
      tags: [Tenant]
      summary: テナント状態切替 (SaaS Admin)
      description: |
        テナントの状態を `ACTIVE` ⇄ `SUSPENDED` で切り替える。
        `SUSPENDED` のテナントに所属するユーザーは、当該テナントへの業務 API アクセスが 403 で拒否される
        (TenantContext 解決時に拒否。Keycloak ログイン自体は通る)。データは無傷で残る。
        SaaS Admin は再度 `ACTIVE` に戻すことができる(復活可能)。
        テナント解約(物理削除・データ凍結)は Phase 2 で扱う。

        **冪等性**: 既に同じ状態のテナントに対して同一 `status` を指定した場合は、副作用なく `200` を返す
        (no-op、監査ログには記録しない)。

        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要(プラットフォーム運用 API)。
        状態が実際に変更された場合のみ、監査ログに `TENANT_SUSPENDED` / `TENANT_REACTIVATED` として記録される。
      operationId: updateTenantStatus
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantStatusUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- プラットフォーム監視 (SaaS Admin) ---
  /api/platform/metrics:
    get:
      tags: [Platform]
      summary: プラットフォーム全体メトリクス (SaaS Admin)
      description: |
        プラットフォーム全体の数値メトリクスを返す(S-12 監視ダッシュボード用)。
        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要(プラットフォーム運用 API)。
        時系列グラフ用のトレンドデータは Phase 2 で追加する。
      operationId: getPlatformMetrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformMetrics" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- テナント内ユーザー管理 (Tenant Admin) ---
  /api/users/me:
    get:
      tags: [User]
      summary: 自身のプロフィール取得(既存usersから読み取り)
      operationId: getMyProfile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/tenant/users:
    get:
      tags: [User]
      summary: 現在のテナント内ユーザー一覧
      description: "認可: Tenant内のMember以上"
      operationId: listTenantUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/tenant/users/invite:
    post:
      tags: [User]
      summary: ユーザー招待 (Tenant Admin)
      description: "認可: Tenant Admin のみ。oidc_subが既存usersに登録済みの場合、user_tenants に紐付け"
      operationId: inviteUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInviteRequest" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /api/tenant/users/{userId}/role:
    put:
      tags: [User]
      summary: ロール変更 (Tenant Admin)
      operationId: updateRole
      parameters:
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [TENANT_ADMIN, MEMBER] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantUser" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # --- タスク ---
  /api/tasks:
    get:
      tags: [Task]
      summary: タスク一覧(認可フィルタ済み)
      description: |
        認可フィルタ済みのタスク一覧を返す。参照認可ルールの詳細は基本設計書 §6.2.1 参照。
        実装の SSOT は TaskAuthorizationDomainService (Domain 層)。
        - tenant_id = X-Tenant-Id (Hibernate Filter で自動付与)
        - deleted_at IS NULL
        - visibility による参照認可が適用される(Tenant Admin は制限なし)
      operationId: listTasks
      parameters:
        - { name: targetDate,     in: query, schema: { type: string, format: date }, description: "表示対象日(省略時は当日 TODAY)" }
        - { name: includeOverdue, in: query, schema: { type: boolean, default: true }, description: "期限切れ未完了タスクを含める" }
        - name: status
          in: query
          style: form
          explode: false
          description: "絞込ステータス(複数指定可、カンマ区切り: status=NOT_STARTED,IN_PROGRESS)"
          schema:
            type: array
            minItems: 1
            items:
              $ref: "#/components/schemas/TaskStatus"
        - { name: ownerId,        in: query, schema: { type: integer, format: int64 } }
        - { name: assigneeId,     in: query, schema: { type: integer, format: int64 } }
        - { name: priority,       in: query, schema: { $ref: "#/components/schemas/Priority" } }
        - { name: visibility,     in: query, schema: { type: string, enum: [TENANT, STAKEHOLDERS, PRIVATE] } }
        - { name: keyword,        in: query, schema: { type: string }, description: "タイトル/説明部分一致" }
        - { name: page,           in: query, schema: { type: integer, default: 0 } }
        - { name: size,           in: query, schema: { type: integer, default: 50, maximum: 100 } }
        - name: sort
          in: query
          description: |
            ソート指定。形式 `<field>,<asc|desc>`(`,asc|desc` 省略時は `asc`)。
            有効フィールド: `dueDate` / `priority` / `createdAt` / `updatedAt` / `title`。
            複数キー指定は本フェーズでは未サポート。
          schema:
            type: string
            default: "dueDate,asc"
            pattern: "^(dueDate|priority|createdAt|updatedAt|title)(,(asc|desc))?$"
            example: "priority,desc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Task]
      summary: タスク作成
      description: |
        認可: Tenant内のMember以上。
        tenant_id, owner_id は認証コンテキストから自動付与する(リクエストボディから受け取らない)。
        due_date は必須。visibility が STAKEHOLDERS のとき stakeholderUserIds を指定可能。
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/tasks/{id}:
    get:
      tags: [Task]
      summary: タスク詳細取得
      description: "認可: 一覧と同じ参照認可ルール。違反時は404を返す(リソース存在を漏らさない)"
      operationId: getTask
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Task]
      summary: タスク更新
      description: "認可: 所有者のみ(または Tenant Admin)。違反時は403"
      operationId: updateTask
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [Task]
      summary: タスク論理削除
      description: "認可: 所有者または Tenant Admin"
      operationId: deleteTask
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: No Content }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/tasks/{id}/status:
    patch:
      tags: [Task]
      summary: ステータス変更
      description: "認可: 所有者・担当者・Tenant Admin"
      operationId: changeStatus
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/TaskStatus" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/tasks/{id}/visibility:
    patch:
      tags: [Task]
      summary: 公開範囲変更
      description: "認可: 所有者のみ"
      operationId: changeVisibility
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visibility]
              properties:
                visibility: { $ref: "#/components/schemas/Visibility" }
                stakeholderUserIds:
                  type: array
                  items: { type: integer, format: int64 }
                  description: "visibility=STAKEHOLDERS のとき指定。既存の関係者は置換される"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Validation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # --- 関係者 ---
  /api/tasks/{id}/stakeholders:
    get:
      tags: [Stakeholder]
      summary: 関係者一覧
      description: "認可: タスク参照可能なユーザー"
      operationId: listStakeholders
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Stakeholder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Stakeholder]
      summary: 関係者追加(所有者のみ)
      operationId: addStakeholder
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: integer, format: int64 }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Stakeholder" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/tasks/{taskId}/stakeholders/{userId}:
    delete:
      tags: [Stakeholder]
      summary: 関係者削除(所有者のみ)
      operationId: removeStakeholder
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- ダッシュボード ---
  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: ダッシュボード集計
      description: "認可: テナント内ユーザー(自分が参照可能なタスク範囲で集計)"
      operationId: getDashboardSummary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- 通知設定 ---
  /api/users/me/notification-settings:
    get:
      tags: [Notification]
      summary: 自身の通知設定を取得(現在のテナント)
      description: |
        ログイン中ユーザーの、現在アクティブなテナントにおける通知フラグを取得する。
        対応するレコードが `user_notification_settings` に無い場合はデフォルト値(全 true)を返す。
      operationId: getNotificationSettings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Notification]
      summary: 自身の通知設定を更新(現在のテナント)
      description: 各フラグの ON/OFF を更新。レコード未存在時は upsert する。
      operationId: updateNotificationSettings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationSettings" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- 監査ログ ---
  /api/audit-logs:
    get:
      tags: [Audit]
      summary: 監査ログ参照 (Tenant Admin)
      operationId: listAuditLogs
      parameters:
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to,   in: query, schema: { type: string, format: date-time } }
        - { name: action, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/AuditLog" }
                  totalElements: { type: integer, format: int64 }
        "403": { $ref: "#/components/responses/Forbidden" }
        "401": { $ref: "#/components/responses/Unauthorized" }

# ======================================================================
# コンポーネント
# ======================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: KeycloakがOIDCで発行するJWT
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-Id
      description: アクティブテナントのID

  responses:
    Unauthorized:
      description: 未認証 / トークン無効
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: 権限なし
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: リソース未存在、または参照権限不足(リソース存在を漏らさない方針)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Validation:
      description: 入力検証エラー
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: リソースの競合状態
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    UnprocessableContent:
      description: 処理不能エンティティ(前提リソース不在など)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # --- 共通 ---
    Error:
      type: object
      required: [timestamp, status, code, message, path]
      properties:
        timestamp: { type: string, format: date-time }
        status:    { type: integer, example: 400 }
        error:     { type: string, example: "Bad Request" }
        code:      { type: string, example: "E_VALIDATION", description: "業務エラーコード" }
        message:   { type: string }
        path:      { type: string }
        fieldErrors:
          type: array
          items:
            type: object
            properties:
              field:   { type: string }
              message: { type: string }

    # --- 列挙 ---
    TaskStatus:
      type: string
      enum: [NOT_STARTED, IN_PROGRESS, DONE, ON_HOLD]
    Priority:
      type: string
      enum: [HIGH, MEDIUM, LOW]
    Visibility:
      type: string
      enum: [TENANT, STAKEHOLDERS, PRIVATE]
    Role:
      type: string
      enum: [TENANT_ADMIN, MEMBER]

    # --- ユーザー / テナント ---
    UserProfile:
      type: object
      required: [id, email, fullName, fullNameKana]
      properties:
        id:             { type: integer, format: int64 }
        email:          { type: string, format: email }
        fullName:       { type: string }
        fullNameKana:   { type: string }
        departmentName:
          type: [string, 'null']

    TenantSummary:
      type: object
      required: [id, code, name, role]
      properties:
        id:   { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        role: { $ref: "#/components/schemas/Role" }

    MeResponse:
      type: object
      required: [user, tenants, activeTenantId]
      properties:
        user:           { $ref: "#/components/schemas/UserProfile" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/TenantSummary" }
        activeTenantId:
          type: [integer, 'null']
          format: int64

    Tenant:
      type: object
      required: [id, code, name, plan, status, createdAt, updatedAt]
      properties:
        id:        { type: integer, format: int64 }
        code:
          type: string
          maxLength: 50
          pattern: "^[a-z0-9-]+$"
          description: |
            テナント識別コード(URL slug 等で使用、UNIQUE 制約)。サーバ側で `name` から自動生成される。
            生成ルール: `name` を小文字化・空白/記号をハイフンに置換・連続ハイフンを 1 つに圧縮・先頭末尾のハイフンを除去。
            最大 50 文字。衝突時はサフィックス `-2`, `-3` ... を付与してリトライする(設計上のリトライ上限は実装時に決定、超過時は 409)。
        name:      { type: string, description: "テナント表示名" }
        plan:      { type: string, enum: [FREE, STANDARD, ENTERPRISE], description: "本フェーズは `FREE` 固定。`STANDARD`/`ENTERPRISE` は Phase 2(契約管理)" }
        status:    { type: string, enum: [ACTIVE, SUSPENDED], description: "`SUSPENDED` のテナントに所属するユーザーは業務 API へのアクセスが 403 で拒否される。物理削除(`DELETED`)は Phase 2" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TenantCreateRequest:
      description: |
        テナント新規作成リクエスト(セルフサインアップ、モデル B)。
        呼び出しユーザーが初代 Tenant Admin として `user_tenants` に自動登録される。
        `code` はサーバ側で `name` の slug から自動生成される(リクエストに含めない、生成ルールは `Tenant.code` 参照)。
        `plan` は本フェーズでは `FREE` 固定(契約管理は Phase 2)。
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          pattern: "\\S"
          description: "テナント表示名。空白文字のみのリクエストは `pattern` 違反として 400 で拒否される。"

    TenantUpdateRequest:
      description: |
        テナント名更新リクエスト(SaaS Admin のみ実行可能)。
        状態切替は `PATCH /api/tenants/{id}/status` を使用すること。
        プラン変更は Phase 2(契約管理機能)で実装する。
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }

    TenantStatusUpdateRequest:
      description: |
        テナント状態切替リクエスト(SaaS Admin のみ実行可能)。
        `SUSPENDED` にすると所属ユーザーがログイン不可になる(データは無傷)。
        物理削除(`DELETED`)は Phase 2。
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ACTIVE, SUSPENDED] }

    TenantCreatedResponse:
      description: |
        テナント新規作成 API の応答。作成されたテナント情報と、自動的に初代 Tenant Admin として登録された `user_tenants` 概要を含む。
      type: object
      required: [tenant, initialAdmin]
      properties:
        tenant:       { $ref: "#/components/schemas/Tenant" }
        initialAdmin: { $ref: "#/components/schemas/TenantUser" }

    PlatformMetrics:
      description: |
        プラットフォーム全体メトリクス(S-12 監視ダッシュボード用)。
        本フェーズは数値カード表示用の集計のみ。時系列グラフ用のトレンドデータは Phase 2。
      type: object
      required: [totalTenants, activeTenants, suspendedTenants, totalUsers, totalTasks, newTenantsLast24h]
      properties:
        totalTenants:        { type: integer, format: int64, description: "総テナント数(ACTIVE + SUSPENDED)" }
        activeTenants:       { type: integer, format: int64, description: "`ACTIVE` 状態のテナント数" }
        suspendedTenants:    { type: integer, format: int64, description: "`SUSPENDED` 状態のテナント数" }
        totalUsers:          { type: integer, format: int64, description: "登録ユーザー総数(`users` 行数)" }
        totalTasks:          { type: integer, format: int64, description: "削除されていないタスク総数(`tasks.deleted_at IS NULL`)" }
        newTenantsLast24h:
          type: integer
          format: int64
          description: |
            直近 24 時間で新規作成されたテナント数。
            計算基準: ローリングウィンドウ(リクエスト時刻 -24h ≤ `tenants.created_at` ≤ リクエスト時刻)。
            タイムゾーン: 比較は **UTC** で実施(`tenants.created_at` は DB に UTC で保存される前提)。

    TenantUser:
      type: object
      required: [userId, email, fullName, role, status, joinedAt]
      properties:
        userId:         { type: integer, format: int64 }
        email:          { type: string, format: email }
        fullName:       { type: string }
        departmentName:
          type: [string, 'null']
        role:           { $ref: "#/components/schemas/Role" }
        status:         { type: string, enum: [ACTIVE, INVITED, DISABLED] }
        joinedAt:       { type: string, format: date-time }

    UserInviteRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role:  { $ref: "#/components/schemas/Role" }

    # --- タスク ---
    UserSummary:
      type: object
      required: [id, fullName]
      properties:
        id:       { type: integer, format: int64 }
        fullName: { type: string }

    Task:
      type: object
      required: [id, title, status, priority, visibility, owner, dueDate, createdAt, updatedAt, editable, deletable]
      properties:
        id:          { type: integer, format: int64 }
        title:       { type: string }
        description:
          type: [string, 'null']
        status:      { $ref: "#/components/schemas/TaskStatus" }
        priority:    { $ref: "#/components/schemas/Priority" }
        visibility:  { $ref: "#/components/schemas/Visibility" }
        owner:       { $ref: "#/components/schemas/UserSummary" }
        assignee:
          oneOf:
            - $ref: "#/components/schemas/UserSummary"
            - type: 'null'
        dueDate:     { type: string, format: date }
        completedAt:
          type: [string, 'null']
          format: date-time
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
        # 認可結果(クライアント側UI制御用)
        editable:    { type: boolean, description: "ログインユーザーが編集可能か" }
        deletable:   { type: boolean }

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          required: [stakeholders]
          properties:
            stakeholders:
              type: array
              items: { $ref: "#/components/schemas/Stakeholder" }

    TaskCreateRequest:
      description: |
        タスク作成リクエスト。
        - `tenant_id` / `owner_id` は認証コンテキストから自動付与する(リクエストボディからは受け取らない)。
        - `dueDate` は必須(F-08 期限必須化)。
        - `status` は本リクエストで指定できない(常に `NOT_STARTED` で作成される)。ステータス変更は `PATCH /api/tasks/{id}/status` を使用。
      type: object
      required: [title, dueDate, priority, visibility]
      properties:
        title:       { type: string, maxLength: 100 }
        description:
          type: [string, 'null']
          maxLength: 2000
        priority:    { $ref: "#/components/schemas/Priority" }
        visibility:  { $ref: "#/components/schemas/Visibility" }
        assigneeId:
          type: [integer, 'null']
          format: int64
        dueDate:     { type: string, format: date }
        stakeholderUserIds:
          type: array
          items: { type: integer, format: int64 }
          description: "visibility=STAKEHOLDERS のとき指定可能"

    TaskUpdateRequest:
      description: |
        タスク更新リクエスト(所有者または Tenant Admin のみ実行可能)。
        本リクエストでは visibility および関係者リストは変更できない。
        - 公開範囲(visibility)変更: PATCH /api/tasks/{id}/visibility を使用
        - 関係者の追加/削除: POST/DELETE /api/tasks/{id}/stakeholders/... を使用
        - ステータス変更: PATCH /api/tasks/{id}/status を使用

        全フィールドが任意だが、少なくとも 1 つのフィールド指定が必須(minProperties: 1)。
        空のリクエストボディはバリデーションエラー(400)で拒否する。
      type: object
      minProperties: 1
      properties:
        title:       { type: string, maxLength: 100 }
        description:
          type: [string, 'null']
          maxLength: 2000
        priority:    { $ref: "#/components/schemas/Priority" }
        assigneeId:
          type: [integer, 'null']
          format: int64
        dueDate:     { type: string, format: date }

    TaskPage:
      type: object
      required: [content, totalElements, totalPages, number, size, overdueCount]
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/Task" }
        totalElements: { type: integer, format: int64 }
        totalPages:    { type: integer }
        number:        { type: integer, description: "現在のページ番号(0始まり)" }
        size:          { type: integer }
        overdueCount:  { type: integer, description: "期限切れ未完了タスク件数(参考)" }

    Stakeholder:
      type: object
      required: [userId, fullName, email, addedBy, addedAt]
      properties:
        userId:   { type: integer, format: int64 }
        fullName: { type: string }
        email:    { type: string, format: email }
        addedBy:  { $ref: "#/components/schemas/UserSummary", description: "関係者を追加した所有者(UI表示・監査用)" }
        addedAt:  { type: string, format: date-time }

    NotificationSettings:
      description: |
        ユーザー通知設定(現在のテナントスコープ)。
        DDL の `user_notification_settings` テーブルに対応。
      type: object
      required: [emailDueToday, emailOverdue, emailStakeholder]
      properties:
        emailDueToday:    { type: boolean, description: "期限当日メール通知(デフォルト true)" }
        emailOverdue:     { type: boolean, description: "期限超過メール通知(デフォルト true)" }
        emailStakeholder: { type: boolean, description: "関係者として登録された時のメール通知(デフォルト true)" }
        updatedAt:        { type: string, format: date-time, readOnly: true }

    DashboardSummary:
      description: |
        ダッシュボード集計。集計対象は §6.2.1 のタスク参照認可フィルタを適用した後の集合に限定する(NIST AC-4 / 基本設計書 §6.2.2)。
        即ち PRIVATE タスクは所有者にのみ加算、STAKEHOLDERS は所有者・担当者・関係者にのみ加算、Tenant Admin は visibility 制限なし。
      type: object
      required: [todayDueCount, overdueCount, completedTodayCount, myOpenCount, statusBreakdown, priorityBreakdown]
      properties:
        todayDueCount:       { type: integer, description: "本日期限のタスク件数" }
        overdueCount:        { type: integer, description: "期限切れ未完了件数" }
        completedTodayCount: { type: integer, description: "本日完了したタスク件数" }
        myOpenCount:         { type: integer, description: "自分が所有する未完了件数" }
        statusBreakdown:
          type: object
          additionalProperties: { type: integer }
          example: { NOT_STARTED: 12, IN_PROGRESS: 5, DONE: 30, ON_HOLD: 2 }
        priorityBreakdown:
          type: object
          additionalProperties: { type: integer }
          example: { HIGH: 4, MEDIUM: 10, LOW: 5 }

    AuditLog:
      type: object
      required: [id, action, detail, createdAt]
      properties:
        id:         { type: integer, format: int64 }
        userId:
          type: [integer, 'null']
          format: int64
        action:     { type: string }
        entityType:
          type: [string, 'null']
        entityId:
          type: [integer, 'null']
          format: int64
        detail:     { type: object, additionalProperties: true }
        ipAddress:
          type: [string, 'null']
        createdAt:  { type: string, format: date-time }
