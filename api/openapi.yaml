openapi: 3.1.0
info:
  title: タスク管理システム API
  description: |
    マルチテナントSaaS型タスク管理システムのREST API仕様(基本設計書 v1.4.4 / 要件定義書 v1.4.3 準拠)。

    認証はKeycloak経由のOIDC、本APIはJWTを Spring Security OAuth2 Resource Server で検証する。
    全リクエストには `Authorization: Bearer {access_token}` を付与し、
    業務 API ではアクティブテナントを `X-Tenant-Id` ヘッダで送出する。
    プラットフォーム運用 API(`/api/auth/*` の一部・`/api/tenants` 系 SaaS Admin 操作・セルフサインアップ・`/api/platform/*`)は `X-Tenant-Id` を要求しない。

    認可は**プラットフォーム軸**と**テナント軸**の 2 軸で直交する(参照のみの Viewer は設けない)。
    タスクごとの参照認可は visibility (TENANT/STAKEHOLDERS/PRIVATE) と所有者・担当者・関係者の関係で決定する(ADR-0005 / 基本設計書 §6.2.1)。

    ## 認可モデル詳細(2 軸直交)

    - **プラットフォーム軸 / SaaS Admin**: Keycloak realm role `APP_ADMIN` で管理する(本システム DB には保持しない)。
      テナント運営 API(`/api/tenants/**` 状態管理・`/api/platform/**` 監視)のみ操作可能。**業務 API(`/api/tasks/**`、`/api/dashboard/**`、`/api/tenant/users/**`、`/api/tenant/dashboard/**`(Tenant Admin 限定)、`/api/audit-logs`(Tenant Admin 限定)等)には触れない**(呼び出された場合は 403)。Spring Security 上は `hasRole('APP_ADMIN')`。
    - **テナント軸 / Tenant Admin**: 本システム DB の `user_tenants.role = TENANT_ADMIN` で管理。
      **テナント運営権限のみ**(ユーザー招待、ロール管理、監査ログ参照、テナント運営者向けダッシュボード `/api/tenant/dashboard/summary` 参照)。**業務タスクへの特別権限は持たない**(ADR-0005)。タスク操作は所有者・担当者・関係者の役割として通常ルール(下記)で行う。Spring Security 上は `hasRole('TENANT_ADMIN')`。
    - **テナント軸 / Member**: 本システム DB の `user_tenants.role = MEMBER` で管理。
      タスク CRUD(編集・論理削除・公開範囲変更は所有者のみ、ステータス変更と関係者の追加・削除は所有者・担当者、参照は visibility ルール)、テナント内タスクの可視性ルールに従う参照が可能。Spring Security 上は `hasRole('MEMBER')`。

    両軸は包含関係ではなく直交する。SaaS Admin が業務 API を呼んでも自動的に Tenant Admin 権限を持つわけではない(同一の Keycloak ユーザーが両方の役割を兼ねている場合、それは別軸での個別の所属である)。Tenant Admin と Member の区別はタスク認可には影響しない(両者ともテナント内ユーザーとして同等のタスク操作権限を持ち、所有者・担当者・関係者の役割に応じて操作可能、ADR-0005)。

    ## タスク認可ルール(ADR-0005 / 基本設計書 §6.2.1)

    タスク認可は **所有者(Owner)・担当者(Assignee)・関係者(Stakeholder)の 3 役割のみで評価**する。

    - 参照: `TENANT` → 同テナント全員 / `STAKEHOLDERS` → 所有者 ∪ 担当者 ∪ `task_stakeholders` 登録者 / `PRIVATE` → 所有者 ∪ 担当者
    - 編集(タイトル / 説明 / 期限 / 担当者 / 優先度 等): 所有者のみ
    - 論理削除: 所有者のみ(物理削除は MVP 不実装、テナント解約 #167 / Phase 2 で扱う)
    - ステータス変更: 所有者 ∪ 担当者
    - 公開範囲変更: 所有者のみ
    - 関係者の追加・削除: 所有者 ∪ 担当者(指名自体は visibility 非依存に可能。参照権限が機能するのは `visibility = STAKEHOLDERS` のときのみ)

    ## セルフサインアップ(モデル B)

    テナント作成 `POST /api/tenants` は **認証済み(Keycloak ログイン済み)のユーザーが自分自身でテナントを作成**する。SaaS Admin 専用 API ではない。作成と同時に呼び出しユーザーが初代 Tenant Admin として `user_tenants` に登録される。レート制限・ドメイン制限・承認制等の濫用対策は Phase 2。

    ## 共通レスポンス

    認証必須エンドポイントは下記レスポンスを共通的に返す可能性があります(個別 `responses` 節では省略している場合あり):

    - `401 Unauthorized` — JWT欠落 / 署名不正 / 期限切れ
    - `403 Forbidden` — テナント越境、ロール権限不足、編集系で所有者でない 等
    - `404 Not Found` — リソース不在、または **参照系で参照権限不足**(リソース存在を漏らさない方針)
    - `409 Conflict` — リソースの競合状態(詳細は基本設計書 §5.4.1。エンドポイント個別のシナリオはレスポンス description 参照)
    - `422 Unprocessable Content` — 前提リソース未存在(招待時に Keycloak 未登録 等。詳細は基本設計書 §5.4.2)
    - `500 Internal Server Error` — サーバー内部エラー
  version: "1.4.5"
  contact:
    name: 開発チーム
    email: dev@example.com
  license:
    name: Proprietary

tags:
  - name: Auth
    description: 認証・セッション管理(Keycloak OIDC)
  - name: Tenant
    description: テナント管理(セルフサインアップ、状態管理、SaaS Admin 向け運営)
  - name: Platform
    description: プラットフォーム監視 API(SaaS Admin 専用)
  - name: User
    description: テナント内ユーザー管理(プロフィール / 通知設定 / 招待 / ロール)
  - name: Task
    description: タスク管理(可視性・関係者・ステータス)
  - name: Dashboard
    description: |
      ダッシュボード集計。個人視点(S-03 / `GET /api/dashboard/summary`)とテナント運営者視点(S-15 / `GET /api/tenant/dashboard/summary`)の 2 種類を提供する。
      いずれも NIST AC-4 整合のため、他者の `PRIVATE` タスクの存在を集計値経由で推定できない設計(個人視点は所有者・担当者のみ加算、テナント運営者視点は `PRIVATE` を集計対象外)。
  - name: Audit
    description: 監査ログ参照(Tenant Admin)

servers:
  - url: https://api.taskflow.example.com
    description: 本番環境
  - url: https://staging-api.taskflow.example.com
    description: ステージング環境
  - url: http://localhost:8080
    description: ローカル開発環境

# ======================================================================
# セキュリティ
# ======================================================================
security:
  - bearerAuth: []
    tenantHeader: []

# ======================================================================
# パス
# ======================================================================
paths:
  # --- 認証・テナント ---
  /api/auth/me:
    get:
      tags: [Auth]
      summary: ログイン中ユーザー情報・所属テナント一覧
      description: |
        ログインユーザーの基本情報と所属テナント一覧を返す。
        テナント未選択状態(初回ログイン直後・テナント切替前)でも呼び出されるため、
        グローバルセキュリティから `tenantHeader` をオーバーライドで除外する。
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/auth/tenants/{tenantId}/select:
    post:
      tags: [Auth]
      summary: アクティブテナント切替
      description: |
        アクティブテナントを設定する。テナント未選択状態でも呼び出されるため、
        グローバルセキュリティから `tenantHeader` をオーバーライドで除外する。
      operationId: selectTenant
      security:
        - bearerAuth: []
      parameters:
        - { name: tenantId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: No Content }
        "403": { $ref: "#/components/responses/Forbidden" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: ログアウト(Keycloakセッション終了)
      description: |
        Keycloakのセッションを終了する。テナント未選択状態でも呼び出し可能なため、
        グローバルセキュリティから `tenantHeader` をオーバーライドで除外する。
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- テナント ---
  /api/tenants:
    get:
      tags: [Tenant]
      summary: テナント一覧 (SaaS Admin)
      description: |
        全テナントの一覧を返す(SaaS Admin 監視ダッシュボード S-13 用)。
        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要(プラットフォーム運用 API)。

        **HTTP ステータス**: 本エンドポイントは SaaS Admin 専用のコレクションリソースであり、認可違反時は `403` を返す。
        個別リソース取得(`GET /api/tenants/{id}`)では「リソース存在を漏らさない」方針で `404` を返すが、
        コレクション全体への列挙拒否では存在秘匿の必要がないため慣習どおり `403` を採用する。

        **デフォルトソート順**: `createdAt DESC`(最近作成されたテナントを先頭)。

        **ページネーション**: Phase 1 ではページネーション未対応(全件返却)。テナント数が増加した時点で
        Phase 2 にて `page` / `size` パラメータの導入を検討する。
      operationId: listTenants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Tenant]
      summary: テナント作成(セルフサインアップ、認証済みユーザー)
      description: |
        認証済み(Keycloak ログイン済み)のユーザーが自分自身でテナントを新規作成する(モデル B)。
        作成と同時に呼び出しユーザーが初代 Tenant Admin として `user_tenants` に登録される(アトミック)。
        `X-Tenant-Id` ヘッダは要求しない(テナント未所属状態で呼ぶ API のため)。

        **JIT プロビジョニング前提**: 呼び出しユーザーの `users` 行は JWT 認証フィルタ層の JIT で
        自動作成されているため、本ハンドラ到達時には必ず確保されている。仮に JIT が失敗した場合は
        認証フィルタ層で `500` を返すため、本ハンドラは `users` 行不在を考慮しなくてよい。

        **複数テナント作成**: 1 ユーザーが複数テナントを作成することは Phase 1 では制限しない
        (コンサル等の兼務想定。`user_tenants` の複数テナント所属モデル §2.4 と整合)。
        レート制限・ドメイン制限・承認制等の濫用対策は Phase 2 で導入する。
      operationId: createTenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantCreateRequest" }
      responses:
        "201":
          description: Created。初代 Tenant Admin として登録された `user_tenants` 概要を含む。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantCreatedResponse" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          $ref: "#/components/responses/Conflict"
          description: テナント名から生成された `code` の一意制約違反(同名テナント存在時の連番付与リトライ後も解消できなかったレアケース)。

  /api/tenants/{id}:
    get:
      tags: [Tenant]
      summary: テナント単体取得
      description: |
        指定 ID のテナント情報を取得する。
        認可: SaaS Admin は任意のテナントを取得可能。一般ユーザーは自分が所属するテナントのみ取得可能。
        所属していないテナントを指定した場合・存在しない ID を指定した場合は、いずれも **404** を返す
        (HTTP Status Policy: 参照系で参照不可は 404、NIST AC-4 リソース存在秘匿)。
        `X-Tenant-Id` ヘッダ不要(クエリ対象テナントはパスパラメータで指定)。
      operationId: getTenant
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: 指定 ID のテナントが存在しない、または一般ユーザーが所属していないテナントを指定した(リソース存在秘匿)。
    put:
      tags: [Tenant]
      summary: テナント名更新 (SaaS Admin)
      description: |
        テナント名(表示名)を更新する。
        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要。
        状態切替は `PATCH /api/tenants/{id}/status` を使用すること(本エンドポイントでは status を変更できない)。
        プラン変更は Phase 2(契約管理機能)で実装する。
      operationId: updateTenant
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: 指定 ID のテナントが存在しない。

  /api/tenants/{id}/status:
    patch:
      tags: [Tenant]
      summary: テナント状態切替 (SaaS Admin)
      description: |
        テナントの状態を `ACTIVE` ⇄ `SUSPENDED` で切り替える。
        `SUSPENDED` のテナントに所属するユーザーは、当該テナントへの業務 API アクセスが 403 で拒否される
        (TenantContext 解決時に拒否。Keycloak ログイン自体は通る)。データは無傷で残る。
        SaaS Admin は再度 `ACTIVE` に戻すことができる(復活可能)。
        テナント解約(物理削除・データ凍結)は Phase 2 で扱う。

        **冪等性**: 既に同じ状態のテナントに対して同一 `status` を指定した場合は、副作用なく `200` を返す
        (no-op、監査ログには記録しない)。

        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要(プラットフォーム運用 API)。
        状態が実際に変更された場合のみ、監査ログに `TENANT_SUSPENDED` / `TENANT_REACTIVATED` として記録される。
      operationId: updateTenantStatus
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantStatusUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: 指定 ID のテナントが存在しない。

  # --- プラットフォーム監視 (SaaS Admin) ---
  /api/platform/metrics:
    get:
      tags: [Platform]
      summary: プラットフォーム全体メトリクス (SaaS Admin)
      description: |
        プラットフォーム全体の数値メトリクスを返す(S-12 監視ダッシュボード用)。
        認可: SaaS Admin のみ。`X-Tenant-Id` ヘッダ不要(プラットフォーム運用 API)。
        時系列グラフ用のトレンドデータは Phase 2 で追加する。
      operationId: getPlatformMetrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformMetrics" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- テナント内ユーザー管理 (Tenant Admin) ---
  /api/users/me:
    get:
      tags: [User]
      summary: 自身のプロフィール取得(既存usersから読み取り)
      operationId: getMyProfile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/tenant/users:
    get:
      tags: [User]
      summary: 現在のテナント内ユーザー一覧
      description: "認可: Tenant内のMember以上"
      operationId: listTenantUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/tenant/users/invite:
    post:
      tags: [User]
      summary: ユーザー招待 (Tenant Admin)
      description: "認可: Tenant Admin のみ。oidc_subが既存usersに登録済みの場合、user_tenants に紐付け"
      operationId: inviteUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInviteRequest" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          $ref: "#/components/responses/Conflict"
          description: 招待対象が既に `user_tenants` に登録済み(重複招待)。
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /api/tenant/users/{userId}/role:
    put:
      tags: [User]
      summary: ロール変更 (Tenant Admin)
      operationId: updateRole
      parameters:
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [TENANT_ADMIN, MEMBER] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantUser" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # --- タスク ---
  /api/tasks:
    get:
      tags: [Task]
      summary: タスク一覧(認可フィルタ済み)
      description: |
        認可フィルタ済みのタスク一覧を返す。参照認可ルールの詳細は基本設計書 §6.2.1 参照。
        実装の SSOT は TaskAuthorizationDomainService (Domain 層)。
        - tenant_id = X-Tenant-Id (Hibernate Filter で自動付与)
        - deleted_at IS NULL
        - visibility による参照認可が適用される(3 役割評価、Tenant Admin の特別権限なし、ADR-0005)
      operationId: listTasks
      parameters:
        - { name: targetDate,     in: query, schema: { type: string, format: date }, description: "表示対象日(省略時は当日 TODAY)" }
        - { name: includeOverdue, in: query, schema: { type: boolean, default: true }, description: "期限切れ未完了タスクを含める" }
        - name: status
          in: query
          style: form
          explode: false
          description: "絞込ステータス(複数指定可、カンマ区切り: status=NOT_STARTED,IN_PROGRESS)"
          schema:
            type: array
            minItems: 1
            items:
              $ref: "#/components/schemas/TaskStatus"
        - { name: ownerId,        in: query, schema: { type: integer, format: int64 } }
        - { name: assigneeId,     in: query, schema: { type: integer, format: int64 } }
        - { name: priority,       in: query, schema: { $ref: "#/components/schemas/Priority" } }
        - { name: visibility,     in: query, schema: { type: string, enum: [TENANT, STAKEHOLDERS, PRIVATE] } }
        - { name: keyword,        in: query, schema: { type: string }, description: "タイトル/説明部分一致" }
        - { name: page,           in: query, schema: { type: integer, default: 0 } }
        - { name: size,           in: query, schema: { type: integer, default: 50, maximum: 100 } }
        - name: sort
          in: query
          description: |
            ソート指定。形式 `<field>,<asc|desc>`(`,asc|desc` 省略時は `asc`)。
            有効フィールド: `dueDate` / `priority` / `createdAt` / `updatedAt` / `title`。
            複数キー指定は本フェーズでは未サポート。
          schema:
            type: string
            default: "dueDate,asc"
            pattern: "^(dueDate|priority|createdAt|updatedAt|title)(,(asc|desc))?$"
            example: "priority,desc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Task]
      summary: タスク作成
      description: |
        認可: Tenant内のMember以上。
        tenant_id, owner_id は認証コンテキストから自動付与する(リクエストボディから受け取らない)。
        due_date は必須。visibility が STAKEHOLDERS のとき stakeholderUserIds を指定可能。
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/tasks/{id}:
    get:
      tags: [Task]
      summary: タスク詳細取得
      description: "認可: 一覧と同じ参照認可ルール。違反時は404を返す(リソース存在を漏らさない)"
      operationId: getTask
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskDetail" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Task]
      summary: タスク更新
      description: "認可: 所有者のみ(Tenant Admin の特別権限なし、ADR-0005)。違反時は 403"
      operationId: updateTask
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: |-
            タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
            なお**更新権限**(所有者のみ、ADR-0005)不足の場合は 403 を返す(基本設計書 §6.2.1)。
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [Task]
      summary: タスク論理削除(所有者のみ)
      description: |
        認可: 所有者のみ(Tenant Admin の特別権限なし、ADR-0005)。違反時は 403。
        物理削除は MVP では提供しない(完全削除はテナント解約 #167 / Phase 2 で扱う)。
      operationId: deleteTask
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: No Content }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: |-
            タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
            なお**論理削除権限**(所有者のみ、ADR-0005)不足の場合は 403 を返す(基本設計書 §6.2.1)。
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/tasks/{id}/status:
    patch:
      tags: [Task]
      summary: ステータス変更
      description: "認可: 所有者または担当者(Tenant Admin の特別権限なし、ADR-0005)"
      operationId: changeStatus
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/TaskStatus" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: |-
            タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
            なお**ステータス変更権限**(所有者・担当者、ADR-0005)不足の場合は 403 を返す(基本設計書 §6.2.1)。

  /api/tasks/{id}/visibility:
    patch:
      tags: [Task]
      summary: 公開範囲変更
      description: "認可: 所有者のみ(Tenant Admin の特別権限なし、ADR-0005)。違反時は 403"
      operationId: changeVisibility
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visibility]
              properties:
                visibility: { $ref: "#/components/schemas/Visibility" }
                stakeholderUserIds:
                  type: array
                  items: { type: integer, format: int64 }
                  description: "visibility=STAKEHOLDERS のとき指定。既存の関係者は置換される"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Validation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: |-
            タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
            なお**公開範囲変更権限**(所有者のみ、ADR-0005)不足の場合は 403 を返す(基本設計書 §6.2.1)。
        "401": { $ref: "#/components/responses/Unauthorized" }

  # --- 関係者 ---
  /api/tasks/{id}/stakeholders:
    get:
      tags: [Stakeholder]
      summary: 関係者一覧
      description: "認可: タスク参照可能なユーザー"
      operationId: listStakeholders
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Stakeholder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
    post:
      tags: [Stakeholder]
      summary: 関係者追加(所有者または担当者)
      description: |
        認可: 所有者または担当者(ADR-0005、Tenant Admin の特別権限なし)。
        関係者指名は visibility 非依存に可能(参照権限として機能するのは `visibility = STAKEHOLDERS` のときのみ、
        `visibility = TENANT` のときはテナント全員が参照可、`PRIVATE` のときは所有者・担当者のみが参照可)。
        本 API は visibility を**自動変更しない**(ADR-0005 §3.4 / 基本設計書 §6.2.1 / 要件定義書 §3.4.5)。
      operationId: addStakeholder
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: integer, format: int64 }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Stakeholder" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: |-
            タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。
            なお**関係者追加権限**(所有者・担当者、ADR-0005)不足の場合は 403 を返す(基本設計書 §6.2.1)。
        "409":
          $ref: "#/components/responses/Conflict"
          description: 指定ユーザーが既に同タスクの関係者として登録済み(重複追加)。

  /api/tasks/{taskId}/stakeholders/{userId}:
    delete:
      tags: [Stakeholder]
      summary: 関係者削除(所有者または担当者)
      description: "認可: 所有者または担当者(ADR-0005、Tenant Admin の特別権限なし)"
      operationId: removeStakeholder
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          $ref: "#/components/responses/NotFound"
          description: |-
            タスクが存在しないか、当該ユーザーが**参照権限**を持たない(可視性チェック不通過によりリソース存在を秘匿、HTTP Status Policy / NIST AC-4)。または対象ユーザーが当該タスクの関係者として登録されていない。
            なお**関係者削除権限**(所有者・担当者、ADR-0005)不足の場合は 403 を返す(基本設計書 §6.2.1)。

  # --- ダッシュボード ---
  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: 個人視点ダッシュボード集計(S-03)
      description: |
        ログイン中ユーザーの個人視点ダッシュボード集計。
        §6.2.1 のタスク参照認可フィルタ(3 役割評価、ADR-0005)を適用した後のタスク集合に対して件数集計を行う。

        - `PRIVATE` タスクは **所有者・担当者** のダッシュボードでのみ加算される
        - `STAKEHOLDERS` タスクは「所有者・担当者・関係者リスト登録ユーザー」にのみ加算される
        - `TENANT` タスクはテナント全員に同一件数で加算される

        **Tenant Admin であっても通常の参照認可フィルタが適用される**(特別権限なし、ADR-0005)。
        テナント運営者視点での集計は別エンドポイント `GET /api/tenant/dashboard/summary`(S-15)を参照。
        根拠: NIST AC-4(情報フロー保護)。集計件数からも他者の PRIVATE タスクの存在を推定させない。
      operationId: getDashboardSummary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          $ref: "#/components/responses/Forbidden"
          description: |-
            業務 API のため SaaS Admin(`APP_ADMIN`)が呼び出した場合は 403(§6.2.1「SaaS Admin の扱い」)。
            その他、テナント越境アクセスや `X-Tenant-Id` 不整合の場合も 403 を返す。

  /api/tenant/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: テナント運営者向けダッシュボード集計(S-15、Tenant Admin)
      description: |
        Tenant Admin によるテナント運営視点のダッシュボード集計(S-15、ADR-0005 §3.5 / 基本設計書 §3.3.4 / §6.2.2.2)。

        - 認可: `hasRole('TENANT_ADMIN')`。Member は 403、SaaS Admin は業務 API 不可で 403(§6.2.1「SaaS Admin の扱い」)
        - `X-Tenant-Id` ヘッダ必須(業務 API、グローバルセキュリティ `tenantHeader` 適用)
        - 集計対象: 自テナント内の `visibility ∈ {TENANT, STAKEHOLDERS}` のタスクのみ
        - **`PRIVATE` タスクは件数も含めて集計対象外**。Tenant Admin であっても PRIVATE タスクの存在を集計値経由で推定できない(NIST AC-4 整合)

        S-03 個人視点(`GET /api/dashboard/summary`)とは認可スコープと集計対象が異なる。本エンドポイントは「テナント全体で共有または関係者限定で動いている業務量」までを把握する運営者視点。
      operationId: getTenantDashboardSummary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantDashboardSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          $ref: "#/components/responses/Forbidden"
          description: |-
            Member が呼び出した場合は 403(認可: `hasRole('TENANT_ADMIN')` のみ許可、§6.2.1)。
            業務 API のため SaaS Admin(`APP_ADMIN`)が呼び出した場合も 403(§6.2.1「SaaS Admin の扱い」)。
            その他、テナント越境アクセスや `X-Tenant-Id` 不整合の場合も 403 を返す。

  # --- 通知設定 ---
  /api/users/me/notification-settings:
    get:
      tags: [Notification]
      summary: 自身の通知設定を取得(現在のテナント)
      description: |
        ログイン中ユーザーの、現在アクティブなテナントにおける通知フラグを取得する。
        対応するレコードが `user_notification_settings` に無い場合はデフォルト値(全 true)を返す。
      operationId: getNotificationSettings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Notification]
      summary: 自身の通知設定を更新(現在のテナント)
      description: 各フラグの ON/OFF を更新。レコード未存在時は upsert する。
      operationId: updateNotificationSettings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationSettings" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
        "400": { $ref: "#/components/responses/Validation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- 監査ログ ---
  /api/audit-logs:
    get:
      tags: [Audit]
      summary: 監査ログ参照 (Tenant Admin)
      operationId: listAuditLogs
      parameters:
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to,   in: query, schema: { type: string, format: date-time } }
        - name: action
          in: query
          description: "監査ログ action 値による完全一致フィルタ。`AuditLog.action` と同じ命名規約に従う(設計規約 §2.5)。"
          schema: { type: string, pattern: "^[A-Z][A-Z0-9_]*$" }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/AuditLog" }
                  totalElements: { type: integer, format: int64 }
        "403": { $ref: "#/components/responses/Forbidden" }
        "401": { $ref: "#/components/responses/Unauthorized" }

# ======================================================================
# コンポーネント
# ======================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: KeycloakがOIDCで発行するJWT
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-Id
      description: アクティブテナントのID

  responses:
    Unauthorized:
      description: 未認証 / トークン無効
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: 権限なし
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: リソース未存在、または参照権限不足(リソース存在を漏らさない方針)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Validation:
      description: 入力検証エラー
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: リソースの競合状態
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    UnprocessableContent:
      description: 処理不能エンティティ(前提リソース不在など)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # --- 共通 ---
    Error:
      type: object
      required: [timestamp, status, code, message, path]
      properties:
        timestamp: { type: string, format: date-time }
        status:    { type: integer, example: 400 }
        error:     { type: string, example: "Bad Request" }
        code:      { type: string, example: "E_VALIDATION", description: "業務エラーコード" }
        message:   { type: string }
        path:      { type: string }
        fieldErrors:
          type: array
          items:
            type: object
            properties:
              field:   { type: string }
              message: { type: string }

    # --- 列挙 ---
    TaskStatus:
      type: string
      enum: [NOT_STARTED, IN_PROGRESS, DONE, ON_HOLD]
    Priority:
      type: string
      enum: [HIGH, MEDIUM, LOW]
    Visibility:
      type: string
      enum: [TENANT, STAKEHOLDERS, PRIVATE]
    Role:
      type: string
      enum: [TENANT_ADMIN, MEMBER]

    # --- ユーザー / テナント ---
    UserProfile:
      type: object
      required: [id, email, fullName, fullNameKana]
      properties:
        id:             { type: integer, format: int64 }
        email:          { type: string, format: email }
        fullName:       { type: string }
        fullNameKana:   { type: string }
        departmentName:
          type: [string, 'null']

    TenantSummary:
      type: object
      required: [id, code, name, role]
      properties:
        id:   { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        role: { $ref: "#/components/schemas/Role" }

    MeResponse:
      type: object
      required: [user, tenants, activeTenantId]
      properties:
        user:           { $ref: "#/components/schemas/UserProfile" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/TenantSummary" }
        activeTenantId:
          type: [integer, 'null']
          format: int64

    Tenant:
      type: object
      required: [id, code, name, plan, status, createdAt, updatedAt]
      properties:
        id:        { type: integer, format: int64 }
        code:
          type: string
          maxLength: 50
          pattern: "^[a-z0-9-]+$"
          description: |
            テナント識別コード(URL slug 等で使用、UNIQUE 制約)。サーバ側で `name` から自動生成される。
            生成ルール: `name` を小文字化・空白/記号をハイフンに置換・連続ハイフンを 1 つに圧縮・先頭末尾のハイフンを除去。
            最大 50 文字。衝突時はサフィックス `-2`, `-3` ... を付与してリトライする(設計上のリトライ上限は実装時に決定、超過時は 409)。
        name:      { type: string, description: "テナント表示名" }
        plan:      { type: string, enum: [FREE, STANDARD, ENTERPRISE], description: "本フェーズは `FREE` 固定。`STANDARD`/`ENTERPRISE` は Phase 2(契約管理)" }
        status:    { type: string, enum: [ACTIVE, SUSPENDED], description: "`SUSPENDED` のテナントに所属するユーザーは業務 API へのアクセスが 403 で拒否される。物理削除(`DELETED`)は Phase 2" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TenantCreateRequest:
      description: |
        テナント新規作成リクエスト(セルフサインアップ、モデル B)。
        呼び出しユーザーが初代 Tenant Admin として `user_tenants` に自動登録される。
        `code` はサーバ側で `name` の slug から自動生成される(リクエストに含めない、生成ルールは `Tenant.code` 参照)。
        `plan` は本フェーズでは `FREE` 固定(契約管理は Phase 2)。
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          pattern: "\\S"
          description: "テナント表示名。空白文字のみのリクエストは `pattern` 違反として 400 で拒否される。"

    TenantUpdateRequest:
      description: |
        テナント名更新リクエスト(SaaS Admin のみ実行可能)。
        状態切替は `PATCH /api/tenants/{id}/status` を使用すること。
        プラン変更は Phase 2(契約管理機能)で実装する。
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }

    TenantStatusUpdateRequest:
      description: |
        テナント状態切替リクエスト(SaaS Admin のみ実行可能)。
        `SUSPENDED` にすると所属ユーザーがログイン不可になる(データは無傷)。
        物理削除(`DELETED`)は Phase 2。
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ACTIVE, SUSPENDED] }

    TenantCreatedResponse:
      description: |
        テナント新規作成 API の応答。作成されたテナント情報と、自動的に初代 Tenant Admin として登録された `user_tenants` 概要を含む。
      type: object
      required: [tenant, initialAdmin]
      properties:
        tenant:       { $ref: "#/components/schemas/Tenant" }
        initialAdmin: { $ref: "#/components/schemas/TenantUser" }

    PlatformMetrics:
      description: |
        プラットフォーム全体メトリクス(S-12 監視ダッシュボード用)。
        本フェーズは数値カード表示用の集計のみ。時系列グラフ用のトレンドデータは Phase 2。
      type: object
      required: [totalTenants, activeTenants, suspendedTenants, totalUsers, totalTasks, newTenantsLast24h]
      properties:
        totalTenants:        { type: integer, format: int64, description: "総テナント数(ACTIVE + SUSPENDED)" }
        activeTenants:       { type: integer, format: int64, description: "`ACTIVE` 状態のテナント数" }
        suspendedTenants:    { type: integer, format: int64, description: "`SUSPENDED` 状態のテナント数" }
        totalUsers:          { type: integer, format: int64, description: "登録ユーザー総数(`users` 行数)" }
        totalTasks:          { type: integer, format: int64, description: "削除されていないタスク総数(`tasks.deleted_at IS NULL`)" }
        newTenantsLast24h:
          type: integer
          format: int64
          description: |
            直近 24 時間で新規作成されたテナント数。
            計算基準: ローリングウィンドウ(リクエスト時刻 -24h ≤ `tenants.created_at` ≤ リクエスト時刻)。
            タイムゾーン: 比較は **UTC** で実施(`tenants.created_at` は DB に UTC で保存される前提)。

    TenantUser:
      type: object
      required: [userId, email, fullName, role, status, joinedAt]
      properties:
        userId:         { type: integer, format: int64 }
        email:          { type: string, format: email }
        fullName:       { type: string }
        departmentName:
          type: [string, 'null']
        role:           { $ref: "#/components/schemas/Role" }
        status:
          type: string
          enum: [ACTIVE, INVITED, DISABLED]
          description: |-
            ユーザーの所属状態(`user_tenants.status` に対応):
            - `INVITED` — 招待済だが初回ログイン未完了(招待トークン照合待ち)
            - `ACTIVE`  — 初回ログイン完了し利用中
            - `DISABLED` — テナント管理者により無効化(本フェーズではこの状態への**遷移 API は提供しない**、Phase 2 / Issue #111)

            本フェーズで発生する状態遷移は `INVITED → ACTIVE` のみ(招待後の初回ログイン)。
            `DISABLED` への遷移は将来フェーズで専用 API(例: `PATCH /api/tenant/users/{userId}/status`)を追加して対応する。
        joinedAt:       { type: string, format: date-time }

    UserInviteRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role:  { $ref: "#/components/schemas/Role" }

    # --- タスク ---
    UserSummary:
      type: object
      required: [id, fullName]
      properties:
        id:       { type: integer, format: int64 }
        fullName: { type: string }

    Task:
      type: object
      required: [id, title, status, priority, visibility, owner, dueDate, createdAt, updatedAt, editable, deletable]
      properties:
        id:          { type: integer, format: int64 }
        title:       { type: string }
        description:
          type: [string, 'null']
        status:      { $ref: "#/components/schemas/TaskStatus" }
        priority:    { $ref: "#/components/schemas/Priority" }
        visibility:  { $ref: "#/components/schemas/Visibility" }
        owner:       { $ref: "#/components/schemas/UserSummary" }
        assignee:
          oneOf:
            - $ref: "#/components/schemas/UserSummary"
            - type: 'null'
        dueDate:     { type: string, format: date }
        completedAt:
          type: [string, 'null']
          format: date-time
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
        # 認可結果(クライアント側UI制御用)
        editable:    { type: boolean, description: "ログインユーザーが編集可能か" }
        deletable:   { type: boolean }

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          required: [stakeholders]
          properties:
            stakeholders:
              type: array
              items: { $ref: "#/components/schemas/Stakeholder" }

    TaskCreateRequest:
      description: |
        タスク作成リクエスト。
        - `tenant_id` / `owner_id` は認証コンテキストから自動付与する(リクエストボディからは受け取らない)。
        - `dueDate` は必須(F-08 期限必須化)。
        - `status` は本リクエストで指定できない(常に `NOT_STARTED` で作成される)。ステータス変更は `PATCH /api/tasks/{id}/status` を使用。
      type: object
      required: [title, dueDate, priority, visibility]
      properties:
        title:       { type: string, maxLength: 100 }
        description:
          type: [string, 'null']
          maxLength: 2000
        priority:    { $ref: "#/components/schemas/Priority" }
        visibility:  { $ref: "#/components/schemas/Visibility" }
        assigneeId:
          type: [integer, 'null']
          format: int64
        dueDate:     { type: string, format: date }
        stakeholderUserIds:
          type: array
          items: { type: integer, format: int64 }
          description: "visibility=STAKEHOLDERS のとき指定可能"

    TaskUpdateRequest:
      description: |
        タスク更新リクエスト(**所有者のみ**実行可能。Tenant Admin の特別権限なし、ADR-0005)。
        本リクエストでは visibility および関係者リストは変更できない。
        - 公開範囲(visibility)変更: PATCH /api/tasks/{id}/visibility を使用(所有者のみ)
        - 関係者の追加/削除: POST/DELETE /api/tasks/{id}/stakeholders/... を使用(所有者・担当者)
        - ステータス変更: PATCH /api/tasks/{id}/status を使用(所有者・担当者)

        全フィールドが任意だが、少なくとも 1 つのフィールド指定が必須(minProperties: 1)。
        空のリクエストボディはバリデーションエラー(400)で拒否する。
      type: object
      minProperties: 1
      properties:
        title:       { type: string, maxLength: 100 }
        description:
          type: [string, 'null']
          maxLength: 2000
        priority:    { $ref: "#/components/schemas/Priority" }
        assigneeId:
          type: [integer, 'null']
          format: int64
        dueDate:     { type: string, format: date }

    TaskPage:
      type: object
      required: [content, totalElements, totalPages, number, size, overdueCount]
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/Task" }
        totalElements: { type: integer, format: int64 }
        totalPages:    { type: integer }
        number:        { type: integer, description: "現在のページ番号(0始まり)" }
        size:          { type: integer }
        overdueCount:  { type: integer, description: "期限切れ未完了タスク件数(参考)" }

    Stakeholder:
      type: object
      required: [userId, fullName, email, addedBy, addedAt]
      properties:
        userId:   { type: integer, format: int64 }
        fullName: { type: string }
        email:    { type: string, format: email }
        addedBy:  { $ref: "#/components/schemas/UserSummary", description: "関係者を追加した所有者(UI表示・監査用)" }
        addedAt:  { type: string, format: date-time }

    NotificationSettings:
      description: |
        ユーザー通知設定(現在のテナントスコープ)。
        DDL の `user_notification_settings` テーブルに対応。
      type: object
      required: [emailDueToday, emailOverdue, emailStakeholder]
      properties:
        emailDueToday:    { type: boolean, description: "期限当日メール通知(デフォルト true)" }
        emailOverdue:     { type: boolean, description: "期限超過メール通知(デフォルト true)" }
        emailStakeholder: { type: boolean, description: "関係者として登録された時のメール通知(デフォルト true)" }
        updatedAt:        { type: string, format: date-time, readOnly: true }

    DashboardSummary:
      description: |
        個人視点ダッシュボード集計(S-03 / `GET /api/dashboard/summary`)のレスポンス。
        集計対象は §6.2.1 のタスク参照認可フィルタ(3 役割評価、ADR-0005)を適用した後のタスク集合に限定する(NIST AC-4 / 基本設計書 §6.2.2.1)。

        - `PRIVATE` タスクは **所有者・担当者** のダッシュボードでのみ加算される(ADR-0005 で PRIVATE 参照は所有者・担当者に拡張済)
        - `STAKEHOLDERS` タスクは「所有者・担当者・関係者リスト登録ユーザー」にのみ加算される
        - `TENANT` タスクはテナント全員に同一件数で加算される
        - Tenant Admin であっても通常の参照認可フィルタが適用される(特別権限なし、ADR-0005)
      type: object
      required: [todayDueCount, overdueCount, completedTodayCount, myOpenCount, statusBreakdown, priorityBreakdown]
      properties:
        todayDueCount:       { type: integer, description: "当日期限のタスク件数(JST 基準、`due_date = TODAY`)" }
        overdueCount:        { type: integer, description: "期限切れ未完了件数(JST 基準、`due_date < TODAY` かつ未完了)" }
        completedTodayCount: { type: integer, description: "本日完了したタスク件数(JST 基準、`completed_at` が当日 00:00〜23:59 JST)" }
        myOpenCount:
          type: integer
          description: |
            自分が**所有する**未完了件数(所有者視点指標)。担当タスク・関係者として関与しているタスクは含まない。
            基本設計書 §3.3.3 S-03「自分が所有するタスクの進捗グラフ」と整合。
        statusBreakdown:
          type: object
          description: "ステータス別件数(未着手・進行中・完了・保留)"
          additionalProperties: { type: integer }
          example: { NOT_STARTED: 12, IN_PROGRESS: 5, DONE: 30, ON_HOLD: 2 }
        priorityBreakdown:
          type: object
          description: "優先度別件数(高・中・低)"
          additionalProperties: { type: integer }
          example: { HIGH: 4, MEDIUM: 10, LOW: 5 }

    TenantDashboardSummary:
      description: |
        テナント運営者向けダッシュボード集計(S-15 / `GET /api/tenant/dashboard/summary`)のレスポンス。
        Tenant Admin がテナント運営視点で把握する集計(基本設計書 §3.3.4 / §6.2.2.2、ADR-0005 §3.5)。

        - 集計対象: 自テナント内の `visibility ∈ {TENANT, STAKEHOLDERS}` のタスクのみ
        - **`PRIVATE` タスクは件数も含めて集計対象外**(NIST AC-4 整合、Tenant Admin であっても存在を集計値経由で推定できない)
        - メンバー別稼働状況・個人特定可能な指標は MVP 対象外(ADR-0005 §3.5)。時系列グラフも MVP 対象外(将来検討)
      type: object
      required: [totalTaskCount, todayDueCount, overdueCount, completedTodayCount, statusBreakdown, priorityBreakdown, memberCount]
      properties:
        totalTaskCount:      { type: integer, description: "集計可能タスク総数(visibility ∈ {TENANT, STAKEHOLDERS}、deleted_at IS NULL)" }
        todayDueCount:       { type: integer, description: "当日期限のタスク件数(JST 基準、`due_date = TODAY`)" }
        overdueCount:        { type: integer, description: "期限切れ未完了件数(JST 基準、`due_date < TODAY` かつ未完了)" }
        completedTodayCount: { type: integer, description: "本日完了したタスク件数(JST 基準、`completed_at` が当日 00:00〜23:59 JST)" }
        statusBreakdown:
          type: object
          description: "ステータス別件数(未着手・進行中・完了・保留)"
          additionalProperties: { type: integer }
          example: { NOT_STARTED: 18, IN_PROGRESS: 9, DONE: 62, ON_HOLD: 3 }
        priorityBreakdown:
          type: object
          description: "優先度別件数(高・中・低)"
          additionalProperties: { type: integer }
          example: { HIGH: 12, MEDIUM: 60, LOW: 20 }
        memberCount:
          type: integer
          description: "テナントの全アクティブ所属ユーザー数(Tenant Admin を含む。`user_tenants.status = ACTIVE` のテナント所属人数)"

    AuditLog:
      description: |
        監査ログのレスポンス表現。`audit_logs` テーブル(基本設計書 v1.4.3 §4.2.6)に対応するが、
        **以下の DDL 列は API レスポンスに含めない**(内部分離キー / 内部実装 / 重複情報のため):

        - `tenant_id` — `/api/audit-logs` は Tenant Admin が自テナントの監査ログを参照する API であり、
          レスポンスは常に呼び出し時の `X-Tenant-Id` ヘッダ値と一致する。内部分離キーであり返却不要(Issue #107、方針 B)。
        - `actor_sub` — Keycloak `sub` クレーム。Tenant Admin が監査ログを参照する目的(自テナント内で「誰が操作したか」の追跡)では
          `userId`(`users.id` への FK)で十分であり、Keycloak の内部識別子を API レスポンスに含める必要はない。
          DB 上は SaaS Admin 操作の追跡用に保持される(基本設計書 §3.2.1 / §4.2 冒頭、ADR-0004)が、本エンドポイントは
          Tenant Admin 専用であり SaaS Admin の業務テーブル操作はそもそも発生しない方針(ADR-0004)。
        - `hash_chain` — 監査ログ改ざん検知用の SHA-256 ハッシュ(基本設計書 §6.7)。API では公開せず、
          改ざん検知ロジック自体を露出させない方針。
      type: object
      required: [id, action, detail, createdAt]
      properties:
        id:         { type: integer, format: int64 }
        userId:
          type: [integer, 'null']
          format: int64
          description: |-
            操作ユーザーの `users.id`。以下のシナリオで `null` になる:
            - 認証失敗イベント(JWT 検証失敗 / 未認証で保護リソースへのアクセス試行)
            - システム起因のバッチ処理(ShedLock 経由のスケジューラ等、人間の操作主体が存在しないイベント)
        action:
          type: string
          pattern: "^[A-Z][A-Z0-9_]*$"
          description: |-
            監査対象の業務操作種別。命名規約は大文字始まり、英数字・アンダースコアのみ(設計規約 §2.5)。
            本フェーズで定義されている標準値(基本設計書 v1.4.3 §4.2.6):
            `LOGIN` / `LOGIN_FAILED` / `CREATE` / `UPDATE` / `DELETE` / `TENANT_CREATED` / `TENANT_SUSPENDED` / `TENANT_REACTIVATED`。
            `LOGIN_FAILED` は JWT 検証失敗 / 未認証アクセス試行を記録(`userId` が NULL になるイベントの代表例)。`*_DENIED`(認可違反)も §6.2.3 の方針に基づき記録する。
            将来エンドポイント追加時に新しい action 値が増える可能性があるため、enum ではなく pattern で命名規約のみを制約する。
            `minLength` は意図的に設定しない:現状の標準値の最短は `LOGIN`(5 文字)だが、将来 3〜4 文字の action 値(例: `VIEW`、`SEND`)が追加された場合のクライアント側破壊的変更を避けるため。
        entityType:
          type: [string, 'null']
        entityId:
          type: [integer, 'null']
          format: int64
        detail:     { type: object, additionalProperties: true }
        ipAddress:
          type: [string, 'null']
        createdAt:  { type: string, format: date-time }
