name: "Web: CI"

on:
  push:
    branches: [main]
  pull_request:

env:
  LANG: ja_JP.UTF-8
  TZ: Asia/Tokyo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-ci-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web-ci.yml'

  web-ci:
    needs: web-ci-changes
    if: needs.web-ci-changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        id: npm-ci
        run: npm ci

      - name: Copy vendor assets
        id: copy-vendor
        run: node scripts/copy-vendor.js

      - name: Verify vendor files
        id: vendor-check
        run: |
          MISSING=()
          check() {
            if [ ! -e "$1" ]; then
              MISSING+=("$1")
              echo "::error::vendor file missing: $1"
            fi
          }
          check "vendor/bootstrap/css/bootstrap.min.css"
          check "vendor/bootstrap/js/bootstrap.bundle.min.js"
          check "vendor/bootstrap-icons/bootstrap-icons.min.css"
          check "vendor/bootstrap-icons/fonts"
          check "vendor/keycloak-js/keycloak.min.js"
          check "vendor/fontsource/noto-sans-jp/400.css"
          check "vendor/fontsource/noto-sans-jp/500.css"
          check "vendor/fontsource/noto-sans-jp/700.css"
          check "vendor/fontsource/noto-sans-jp/files"
          if [ ${#MISSING[@]} -gt 0 ]; then
            exit 1
          fi

      - name: Biome lint / format check
        id: biome
        run: npx biome ci .

      - name: html-validate (CE metadata + inline guard)
        id: html-validate
        run: npx html-validate index.html tasks.html

      - name: Nu Html Checker (v.Nu — Living Standard 準拠)
        id: vnu
        run: |
          docker run -d --rm --name vnu-server -p 8888:8888 ghcr.io/validator/validator:latest
          timeout 30 bash -c 'until curl -sf http://localhost:8888/ >/dev/null 2>&1; do sleep 1; done'
          errors=0
          for f in index.html tasks.html; do
            out=$(curl -s \
              -H "Content-Type: text/html; charset=utf-8" \
              --data-binary @"$f" \
              "http://localhost:8888/?out=gnu")
            if [ -n "$(printf '%s' "$out" | tr -d '[:space:]')" ]; then
              echo "::error::v.Nu: $f"
              printf '%s\n' "$out"
              errors=1
            fi
          done
          docker stop vnu-server || true
          exit "$errors"

      - name: Build CI report
        id: ci-report
        if: always() && github.event_name == 'pull_request'
        env:
          NPM_CI_OUTCOME: ${{ steps.npm-ci.outcome }}
          COPY_OUTCOME: ${{ steps.copy-vendor.outcome }}
          VENDOR_OUTCOME: ${{ steps.vendor-check.outcome }}
          BIOME_OUTCOME: ${{ steps.biome.outcome }}
          HTML_VALIDATE_OUTCOME: ${{ steps.html-validate.outcome }}
          VNU_OUTCOME: ${{ steps.vnu.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUM: ${{ github.run_number }}
          GH_SHA: ${{ github.sha }}
        run: |
          SHA_SHORT="${GH_SHA:0:7}"
          NOW="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          icon() { [ "$1" = "success" ] && echo ":white_check_mark:" || echo ":x:"; }
          {
            echo 'BODY<<__CI_REPORT_EOF__'
            echo "### Web CI 結果 — Run [#${RUN_NUM}](${RUN_URL}) (\`${SHA_SHORT}\`)"
            echo ""
            echo "| ステップ | 結果 |"
            echo "|----------|------|"
            echo "| npm ci $(icon "$NPM_CI_OUTCOME") | lockfile 整合検証 |"
            echo "| copy-vendor $(icon "$COPY_OUTCOME") | vendor アセットコピー |"
            echo "| vendor check $(icon "$VENDOR_OUTCOME") | 主要ファイル存在確認 |"
            echo "| biome ci $(icon "$BIOME_OUTCOME") | lint / format 検証 |"
            echo "| html-validate $(icon "$HTML_VALIDATE_OUTCOME") | CE メタデータ + inline 退行ガード |"
            echo "| v.Nu $(icon "$VNU_OUTCOME") | Living Standard 準拠検証 |"
            echo ""
            echo "_最終更新: ${NOW}_"
            echo '__CI_REPORT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky CI report
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request' && steps.ci-report.outcome == 'success'
        with:
          header: web-ci
          message: ${{ steps.ci-report.outputs.BODY }}
