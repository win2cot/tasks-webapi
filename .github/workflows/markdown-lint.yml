name: "Markdown: Lint"

on:
  push:
    branches: [main]
  pull_request:

env:
  LANG: ja_JP.UTF-8
  TZ: Asia/Tokyo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint-changes:
    runs-on: ubuntu-latest
    outputs:
      md: ${{ steps.filter.outputs.md }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            md:
              - '**/*.md'
              - '.markdownlint.jsonc'
              - '.github/workflows/markdown-lint.yml'

  markdown-lint:
    needs: markdown-lint-changes
    if: needs.markdown-lint-changes.outputs.md == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # docs/reviews/** は過去のレビュー履歴・起票メモ(凍結された作業スナップショット)のため lint 対象外
      - name: Lint Markdown
        id: mdlint
        run: npx --yes markdownlint-cli2@0.23.0 "**/*.md" "!**/node_modules/**" "!**/build/**" "!**/.cowork-tmp/**" "!docs/reviews/**"
        continue-on-error: true

      - name: Build lint report
        id: lint-report
        if: always() && github.event_name == 'pull_request'
        env:
          LINT_OUTCOME: ${{ steps.mdlint.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUM: ${{ github.run_number }}
          GH_SHA: ${{ github.sha }}
        run: |
          SHA_SHORT="${GH_SHA:0:7}"
          NOW="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"

          if [ "$LINT_OUTCOME" = "success" ]; then
            LINT_ROW="| Markdown Lint :white_check_mark: | Run [#${RUN_NUM}](${RUN_URL}) — 警告・エラーなし |"
          else
            LINT_ROW="| Markdown Lint :x: | Run [#${RUN_NUM}](${RUN_URL}) — lint エラーあり(詳細はログ参照) |"
          fi

          {
            echo 'BODY<<__LINT_REPORT_EOF__'
            echo "### Markdown Lint 結果 — Run [#${RUN_NUM}](${RUN_URL}) (\`${SHA_SHORT}\`)"
            echo ""
            echo "| 項目 | 結果 |"
            echo "|------|------|"
            echo "${LINT_ROW}"
            echo ""
            echo "_最終更新: ${NOW}_"
            echo '__LINT_REPORT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky lint report
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request' && steps.lint-report.outcome == 'success'
        with:
          header: markdown-lint
          message: ${{ steps.lint-report.outputs.BODY }}

      - name: Fail on lint errors
        if: steps.mdlint.outcome == 'failure'
        run: exit 1
