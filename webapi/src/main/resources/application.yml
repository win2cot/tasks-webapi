# env vars (required at startup):
#   DATASOURCE_URL      - JDBC URL e.g. jdbc:mysql://localhost:3306/tasks?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=SERVER&forceConnectionTimeZoneToSession=true
#   DATASOURCE_USERNAME - DB user e.g. tasks_webapi
#   DATASOURCE_PASSWORD - DB password (empty string allowed for IAM auth)
#   OIDC_ISSUER_URI     - Keycloak realm issuer e.g. http://localhost:8080/realms/tasks
# See .env.local for local development values.

spring:
  application:
    name: tasks-webapi
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Tokyo
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    root: INFO
    xyz.dgz48: DEBUG
