# env vars (required at startup):
#   DB_HOST              - DB hostname e.g. localhost
#   DB_PORT              - DB port (optional, default 3306)
#   DATASOURCE_USERNAME  - DB user e.g. tasks_webapi
#   DATASOURCE_PASSWORD  - DB password (unused when RDS_IAM_AUTH_ENABLED=true)
#   OIDC_ISSUER_URI      - Keycloak realm issuer e.g. http://localhost:8080/realms/tasks
#   CORS_ALLOWED_ORIGINS - Comma-separated list of allowed origins (default: localhost)
#   RDS_IAM_AUTH_ENABLED - Set to "true" on ECS Fargate to use IAM auth instead of password auth
# See .env.local for local development values.

spring:
  application:
    name: tasks-webapi
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/tasks?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=SERVER&forceConnectionTimeZoneToSession=true"
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Tokyo
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI}

server:
  port: 8080

# Observability: OFF by default; enable per-env via environment variables / Parameter Store (ADR-0029 §3.2 / §6.2).
# Traces : MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://<collector>:4318/v1/traces
#          MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
# Metrics: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=true
#          MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://<collector>:4318/v1/metrics
# endpoint/url キーをここに書かない理由: 空文字列でも @ConditionalOnProperty を通過し
# OtlpHttpSpanExporter / OTLP metrics exporter が起動失敗する。
management:
  endpoints:
    web:
      exposure:
        include: health,info
  observations:
    annotations:
      enabled: true   # @Observed / @ObservationKeyValue AOP を有効化(ADR-0029 §6.1)
  tracing:
    sampling:
      probability: 0
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    root: INFO
    xyz.dgz48: DEBUG

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5500}

rds:
  iam-auth:
    enabled: ${RDS_IAM_AUTH_ENABLED:false}
    region: ${AWS_DEFAULT_REGION:ap-northeast-1}

# 監査ログ ハッシュチェーン改ざん検知(ADR-0038)。HMAC 鍵の取得元を切り替える。
#   source=property(既定): secret 値を鍵に用いる(ローカル/テスト)。
#   source=ssm(本番)     : Parameter Store SecureString から <ssm-parameter-prefix>-<key-id> をロード。
audit:
  hash-chain:
    key-id: ${AUDIT_HASH_CHAIN_KEY_ID:v1}
    source: ${AUDIT_HASH_CHAIN_SOURCE:property}
    secret: ${AUDIT_HASH_CHAIN_SECRET:dev-insecure-audit-hmac-key-change-me}
    ssm-parameter-prefix: ${AUDIT_HASH_CHAIN_SSM_PREFIX:/tasks/dev/app/audit-hash-key}
  # B-05 監査ログ整合性検証バッチ(毎日 02:00 JST、ShedLock 排他、ADR-0038 §3.7)。
  verification:
    batch:
      enabled: ${AUDIT_VERIFICATION_BATCH_ENABLED:true}
      cron: ${AUDIT_VERIFICATION_BATCH_CRON:0 0 2 * * *}
      zone: ${AUDIT_VERIFICATION_BATCH_ZONE:Asia/Tokyo}

# 通知バッチ(B-01 期限当日通知メール、設計規約 §7 / 基本設計書 §8.1)。
# email.provider=ses のときのみ SES クライアントを生成。既定 log はローカル/テスト用のログフォールバック。
notification:
  email:
    provider: ${NOTIFICATION_EMAIL_PROVIDER:log}
    from: ${NOTIFICATION_EMAIL_FROM:no-reply@example.invalid}
  batch:
    enabled: ${NOTIFICATION_BATCH_ENABLED:true}
    cron: ${NOTIFICATION_BATCH_CRON:0 0 9 * * *}
    zone: ${NOTIFICATION_BATCH_ZONE:Asia/Tokyo}

# A-09 招待(ADR-0017)。招待メールの受諾リンクのベース URL。
# 平文トークンを <accept-url-base>?token=... の形でメール本文にのみ載せる(本番は実ドメインを設定)。
tenant:
  invite:
    accept-url-base: ${TENANT_INVITE_ACCEPT_URL_BASE:http://localhost:8080/invitations/accept}
