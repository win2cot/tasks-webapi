services:
  mysql:
    image: mysql:8.4
    command: --default-time-zone=Asia/Tokyo
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks
      MYSQL_USER: tasks_webapi
      MYSQL_PASSWORD: tasks_webapi
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "tasks_webapi", "-ptasks_webapi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    build:
      context: .
      dockerfile: keycloak/Dockerfile
    # Override production CMD for local development: use start-dev (H2 embedded) with realm import.
    # KC 自身のストアは H2 のまま。User Storage SPI(ADR-0006)は下記 SPI_DB_* で compose の MySQL
    # (app の users テーブル)へ別途 JDBC 接続して federation する。
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Fix the frontend URL so the token `iss` claim is always http://localhost:18080/realms/tasks,
      # matching what the browser sees. Without this, start-dev derives the URL from the incoming
      # Host header, which would differ between browser and webapi backchannel calls.
      KC_HOSTNAME: "http://localhost:18080"
      # User Storage SPI の接続先(realm-export のコンポーネントは有効化のみ、接続情報は env で与える)。
      SPI_DB_JDBC_URL: "jdbc:mysql://mysql:3306/tasks?allowPublicKeyRetrieval=true&useSSL=false"
      SPI_DB_USERNAME: tasks_webapi
      SPI_DB_PASSWORD: tasks_webapi
    ports:
      - "18080:8080"
    volumes:
      - ./keycloak/realm-export:/opt/keycloak/data/import
    # SPI が起動直後から MySQL(app users)を参照できるよう mysql の healthy を待つ。
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      # curl は Keycloak 26 の slim イメージに含まれないため bash /dev/tcp で代用する。
      # /realms/tasks が 200 を返す = サーバ起動 + realm import 完了の両方を同時に確認できる。
      # start-dev モードでは KC_HEALTH_ENABLED が無効のため /health/ready は使えない。
      test:
        - "CMD-SHELL"
        - |
          exec 3<>/dev/tcp/localhost/8080 &&
          printf 'GET /realms/tasks HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200 OK'
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # otel-lgtm: ローカル計測用 OTLP レシーバ + Grafana + Tempo + Prometheus (ADR-0029 §3.1)
  # Grafana UI: http://localhost:3000 (admin/admin)
  # OTLP HTTP:  http://localhost:4318  ← webapi の OTLP エンドポイントに指定する
  otel-lgtm:
    image: grafana/otel-lgtm:0.28.0
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    healthcheck:
      # otel-lgtm は起動完了時に /tmp/ready を作成する
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s

volumes:
  mysql-data:
