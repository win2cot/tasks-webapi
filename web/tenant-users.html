<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー管理 — Tasks</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<a href="#main-content" class="visually-hidden-focusable position-absolute p-2 m-2 bg-primary text-white rounded">
  メインコンテンツへスキップ
</a>

<!-- ===== Top navbar ===== -->
<nav class="app-navbar d-flex align-items-center px-3 gap-3 sticky-top" aria-label="グローバルナビゲーション">
  <a class="app-brand d-flex align-items-center gap-2" href="index.html">
    <i class="bi bi-check2-square fs-5" aria-hidden="true"></i><span>Tasks</span>
  </a>
  <app-tenant-switcher id="tenant-switcher" class="d-none"></app-tenant-switcher>
  <div class="ms-auto d-flex align-items-center gap-3">
    <div class="d-flex align-items-center gap-2">
      <div id="user-avatar"
        class="rounded-circle bg-primary-subtle text-primary d-grid"
        aria-hidden="true">?</div>
      <span id="nav-username" class="small d-none d-lg-inline"></span>
    </div>
    <button id="btn-logout" type="button" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-box-arrow-right me-1" aria-hidden="true"></i>ログアウト
    </button>
  </div>
</nav>

<div class="app-layout">
  <!-- ===== Sidebar ===== -->
  <aside class="app-sidebar d-none d-lg-block" aria-label="サイドナビゲーション">
    <div class="nav-group-label" aria-hidden="true">メイン</div>
    <a class="side-link" href="dashboard.html">
      <i class="bi bi-speedometer2" aria-hidden="true"></i>ダッシュボード
    </a>
    <a class="side-link" href="tasks.html">
      <i class="bi bi-list-check" aria-hidden="true"></i>タスク一覧
    </a>
    <div class="admin-only">
      <div class="nav-group-label" aria-hidden="true">テナント運営</div>
      <a class="side-link" href="tenant-dashboard.html">
        <i class="bi bi-graph-up-arrow" aria-hidden="true"></i>運営者ダッシュボード
      </a>
      <a class="side-link active" href="tenant-users.html" aria-current="page">
        <i class="bi bi-people" aria-hidden="true"></i>ユーザー管理
      </a>
    </div>
    <div class="nav-group-label" aria-hidden="true">アカウント</div>
    <a class="side-link" href="profile.html">
      <i class="bi bi-person-circle" aria-hidden="true"></i>プロフィール
    </a>
    <a class="side-link" href="notification-settings.html">
      <i class="bi bi-bell" aria-hidden="true"></i>通知設定
    </a>
  </aside>

  <!-- ===== Main ===== -->
  <main id="main-content" class="app-main">
    <div class="d-flex align-items-center flex-wrap gap-3 mb-3">
      <h1 class="page-title">ユーザー管理</h1>
    </div>

    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">ユーザー情報を取得中...</p>
    </div>

    <div id="content" class="d-none">
      <!-- ===== 招待フォーム ===== -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h6 mb-3">ユーザーを招待</h2>
          <form id="invite-form" class="row g-2 align-items-end" novalidate>
            <div class="col-12 col-md-6">
              <label for="invite-email" class="form-label small text-muted">メールアドレス</label>
              <input type="email" id="invite-email" class="form-control" required
                placeholder="user@example.com" autocomplete="off">
            </div>
            <div class="col-8 col-md-3">
              <label for="invite-role" class="form-label small text-muted">ロール</label>
              <select id="invite-role" class="form-select">
                <option value="MEMBER" selected>メンバー</option>
                <option value="TENANT_ADMIN">テナント管理者</option>
              </select>
            </div>
            <div class="col-4 col-md-3 d-grid">
              <button type="submit" id="btn-invite" class="btn btn-primary">
                <i class="bi bi-envelope-plus me-1" aria-hidden="true"></i>招待
              </button>
            </div>
          </form>
          <div id="invite-feedback" class="small mt-2 d-none" role="status"></div>
        </div>
      </div>

      <!-- ===== メンバー一覧 ===== -->
      <div class="card">
        <div class="card-body">
          <h2 class="h6 mb-3">メンバー一覧</h2>
          <div class="table-responsive">
            <table class="table align-middle mb-0" aria-label="メンバー一覧">
              <thead>
                <tr>
                  <th scope="col">氏名</th>
                  <th scope="col">メールアドレス</th>
                  <th scope="col">ロール</th>
                  <th scope="col">状態</th>
                  <th scope="col" class="text-end">操作</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="vendor/keycloak-js/keycloak.min.js"></script>
<script src="js/dom.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components/app-tenant-switcher.js"></script>
<script src="js/tenant-users.js"></script>
</body>
</html>
