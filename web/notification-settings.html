<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知設定 — Tasks</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<a href="#main-content" class="visually-hidden-focusable position-absolute p-2 m-2 bg-primary text-white rounded">
  メインコンテンツへスキップ
</a>

<!-- ===== Top navbar ===== -->
<nav class="app-navbar d-flex align-items-center px-3 gap-3 sticky-top" aria-label="グローバルナビゲーション">
  <a class="app-brand d-flex align-items-center gap-2" href="index.html">
    <i class="bi bi-check2-square fs-5" aria-hidden="true"></i><span>Tasks</span>
  </a>
  <app-tenant-switcher id="tenant-switcher" class="d-none"></app-tenant-switcher>
  <div class="ms-auto d-flex align-items-center gap-3">
    <div class="d-flex align-items-center gap-2">
      <div id="user-avatar"
        class="rounded-circle bg-primary-subtle text-primary d-grid"
        aria-hidden="true">?</div>
      <span id="nav-username" class="small d-none d-lg-inline"></span>
    </div>
    <button id="btn-logout" type="button" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-box-arrow-right me-1" aria-hidden="true"></i>ログアウト
    </button>
  </div>
</nav>

<div class="app-layout">
  <!-- ===== Sidebar ===== -->
  <aside class="app-sidebar d-none d-lg-block" aria-label="サイドナビゲーション">
    <div class="nav-group-label" aria-hidden="true">メイン</div>
    <a class="side-link" href="index.html">
      <i class="bi bi-speedometer2" aria-hidden="true"></i>ダッシュボード
    </a>
    <a class="side-link" href="tasks.html">
      <i class="bi bi-list-check" aria-hidden="true"></i>タスク一覧
    </a>
    <div class="admin-only">
      <div class="nav-group-label" aria-hidden="true">テナント運営</div>
      <a class="side-link" href="tenant-dashboard.html">
        <i class="bi bi-graph-up-arrow" aria-hidden="true"></i>運営者ダッシュボード
      </a>
      <a class="side-link" href="#">
        <i class="bi bi-people" aria-hidden="true"></i>ユーザー管理
      </a>
    </div>
    <div class="nav-group-label" aria-hidden="true">アカウント</div>
    <a class="side-link" href="profile.html"><i class="bi bi-person-circle" aria-hidden="true"></i>プロフィール</a>
    <a class="side-link active" href="notification-settings.html" aria-current="page">
      <i class="bi bi-bell" aria-hidden="true"></i>通知設定
    </a>
  </aside>

  <!-- ===== Main ===== -->
  <main id="main-content" class="app-main">
    <div class="d-flex align-items-center flex-wrap gap-3 mb-3">
      <h1 class="page-title">通知設定</h1>
    </div>
    <p class="text-muted small mb-3">現在のテナントにおける、自分宛てのメール通知の ON/OFF を設定します。</p>

    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>
    <div id="saved-alert" class="alert alert-success d-none" role="status">保存しました。</div>

    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">設定を取得中...</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-7">
        <form id="settings-form" class="card d-none">
          <div class="card-body">
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" role="switch" id="email-due-today">
              <label class="form-check-label" for="email-due-today">
                期限当日のメール通知
                <span class="d-block text-muted small">期限が今日のタスクを当日に通知します。</span>
              </label>
            </div>
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" role="switch" id="email-overdue">
              <label class="form-check-label" for="email-overdue">
                期限超過のメール通知
                <span class="d-block text-muted small">期限を過ぎた未完了タスクを通知します。</span>
              </label>
            </div>
            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" role="switch" id="email-stakeholder">
              <label class="form-check-label" for="email-stakeholder">
                関係者登録のメール通知
                <span class="d-block text-muted small">タスクの関係者として登録されたときに通知します。</span>
              </label>
            </div>
            <button id="btn-save" type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="vendor/keycloak-js/keycloak.min.js"></script>
<script src="js/dom.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components/app-tenant-switcher.js"></script>
<script src="js/notification-settings.js"></script>
</body>
</html>
